<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Processing — LocalStack Workshop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    header span { font-size: 0.85rem; color: #aaa; margin-left: auto; }

    main { max-width: 1000px; margin: 2rem auto; padding: 0 1.5rem; }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #444; text-transform: uppercase; letter-spacing: 0.05em; }

    form { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; }
    label { display: flex; flex-direction: column; gap: 0.3rem; font-size: 0.875rem; color: #555; }
    input[type="text"], input[type="number"] {
      padding: 0.5rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
      width: 200px;
    }
    input[type="number"] { width: 80px; }
    button[type="submit"] {
      padding: 0.5rem 1.25rem;
      background: #e8412a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 500;
    }
    button[type="submit"]:hover { background: #c73520; }
    button[type="submit"]:disabled { background: #ccc; cursor: not-allowed; }

    .flash {
      padding: 0.6rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      margin-top: 0.75rem;
      display: none;
    }
    .flash.success { background: #e6f4ea; color: #1e7e34; display: block; }
    .flash.error   { background: #fde8e8; color: #c0392b; display: block; }

    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .table-header-right { display: flex; align-items: center; gap: 0.75rem; }
    .refresh-btn {
      padding: 0.3rem 0.9rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .refresh-btn:hover { background: #f5f5f5; }
    #refresh-indicator { font-size: 0.78rem; color: #aaa; display: none; }
    #refresh-indicator.active { display: inline; color: #084298; }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; color: #666; font-weight: 600; border-bottom: 2px solid #eee; white-space: nowrap; }
    td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr.data-row { cursor: pointer; }
    tr.data-row:hover td { background: #f8f8f8; }
    tr.data-row.expanded td { background: #f0f5ff; border-bottom: none; }
    tr.detail-row { display: none; }
    tr.detail-row.visible { display: table-row; }
    tr.detail-row td { background: #f7f9ff; border-bottom: 1px solid #e0e8ff; padding: 0.75rem 1rem; }

    .expand-icon { color: #aaa; font-size: 0.7rem; margin-right: 0.3rem; transition: transform 0.15s; display: inline-block; }
    tr.data-row.expanded .expand-icon { transform: rotate(90deg); }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .badge.pending            { background: #fff3cd; color: #856404; }
    .badge.validating         { background: #cfe2ff; color: #084298; }
    .badge.payment_processing { background: #e0d7ff; color: #4a1a8a; }
    .badge.fulfilled          { background: #d1f5d3; color: #1a7a2a; }
    .badge.failed             { background: #fde8e8; color: #c0392b; }

    .pipeline {
      display: flex;
      align-items: center;
      font-size: 0.7rem;
      white-space: nowrap;
    }
    .pipeline-step {
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      color: #999;
      background: #f0f0f0;
    }
    .pipeline-step.done   { background: #d1f5d3; color: #1a7a2a; }
    .pipeline-step.active { background: #cfe2ff; color: #084298; font-weight: 600; }
    .pipeline-step.failed { background: #fde8e8; color: #c0392b; }
    .pipeline-arrow { color: #ccc; padding: 0 2px; }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.5rem 1.5rem;
      font-size: 0.82rem;
    }
    .detail-item { display: flex; flex-direction: column; gap: 0.1rem; }
    .detail-label { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    .detail-value { font-family: monospace; color: #333; word-break: break-all; }
    .detail-value.ts { font-family: inherit; color: #555; }

    .order-id { font-family: monospace; font-size: 0.78rem; color: #888; }
    .timestamp { font-size: 0.78rem; color: #999; white-space: nowrap; }
    .empty { text-align: center; color: #aaa; padding: 2rem; }

    #api-bar { font-size: 0.78rem; color: #aaa; margin-bottom: 1rem; }
    #api-bar code { background: #f0f0f0; padding: 0.1rem 0.4rem; border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <h1>Order Processing Pipeline</h1>
  <span>LocalStack Workshop</span>
</header>

<main>
  <p id="api-bar">API endpoint: <code id="api-url"></code></p>

  <div class="card">
    <h2>New Order</h2>
    <form id="order-form">
      <label>
        Item
        <input type="text" id="item" placeholder="e.g. LocalStack T-Shirt" required />
      </label>
      <label>
        Quantity
        <input type="number" id="quantity" value="1" min="1" required />
      </label>
      <button type="submit" id="submit-btn">Place Order</button>
    </form>
    <div class="flash" id="flash"></div>
  </div>

  <div class="card">
    <div class="table-header">
      <h2>Orders</h2>
      <div class="table-header-right">
        <span id="refresh-indicator">↻ auto-refreshing…</span>
        <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th></th>
          <th>Order ID</th>
          <th>Item</th>
          <th>Qty</th>
          <th>Created</th>
          <th>Status</th>
          <th>Pipeline</th>
        </tr>
      </thead>
      <tbody id="orders-body">
        <tr><td colspan="7" class="empty">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
  const API = window.location.origin + "/restapis/workshop/local/_user_request_";
  document.getElementById("api-url").textContent = API;

  const STEPS = ["pending", "validating", "payment_processing", "fulfilled"];
  const TERMINAL = new Set(["fulfilled", "failed"]);
  let refreshTimer = null;

  function stepClass(step, current) {
    if (current === "failed") return step === "pending" ? "done" : "failed";
    const ci = STEPS.indexOf(current), si = STEPS.indexOf(step);
    if (si < ci) return "done";
    if (si === ci) return "active";
    return "";
  }

  function pipeline(status) {
    const labels = { pending: "pending", validating: "validating", payment_processing: "payment", fulfilled: "fulfilled" };
    return STEPS.map((s, i) => `
      ${i > 0 ? '<span class="pipeline-arrow">›</span>' : ""}
      <span class="pipeline-step ${stepClass(s, status)}">${labels[s]}</span>
    `).join("");
  }

  function fmt(ts) {
    if (!ts) return "—";
    return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function detailRow(o) {
    const fields = [
      ["Full Order ID",  `<span class="detail-value">${o.order_id}</span>`],
      ["Created",        `<span class="detail-value ts">${fmt(o.created_at)}</span>`],
      ["Validating at",  `<span class="detail-value ts">${fmt(o.validating_at)}</span>`],
      ["Payment at",     `<span class="detail-value ts">${fmt(o.payment_at)}</span>`],
      ["Fulfilled at",   `<span class="detail-value ts">${fmt(o.fulfilled_at)}</span>`],
      ["Failed at",      `<span class="detail-value ts">${fmt(o.failed_at)}</span>`],
    ].filter(([, v]) => !v.includes(">—<"))
     .map(([label, val]) => `<div class="detail-item"><span class="detail-label">${label}</span>${val}</div>`)
     .join("");
    return `<div class="detail-grid">${fields}</div>`;
  }

  function toggleDetail(id) {
    const dataRow   = document.getElementById(`row-${id}`);
    const detailRow = document.getElementById(`detail-${id}`);
    dataRow.classList.toggle("expanded");
    detailRow.classList.toggle("visible");
  }

  function setAutoRefresh(active) {
    document.getElementById("refresh-indicator").className = active ? "active" : "";
    if (active && !refreshTimer) {
      refreshTimer = setInterval(loadOrders, 3000);
    } else if (!active && refreshTimer) {
      clearInterval(refreshTimer);
      refreshTimer = null;
    }
  }

  async function loadOrders() {
    try {
      const res = await fetch(`${API}/orders`);
      const orders = await res.json();
      const tbody = document.getElementById("orders-body");

      if (!orders.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">No orders yet. Place one above!</td></tr>';
        setAutoRefresh(false);
        return;
      }

      // Remember which rows are currently expanded
      const expanded = new Set(
        [...document.querySelectorAll("tr.data-row.expanded")]
          .map(r => r.dataset.id)
      );

      const sorted = [...orders].sort((a, b) => (b.created_at || "").localeCompare(a.created_at || ""));
      tbody.innerHTML = sorted.flatMap(o => {
        const isExpanded = expanded.has(o.order_id);
        return [
          `<tr class="data-row${isExpanded ? " expanded" : ""}" id="row-${o.order_id}" data-id="${o.order_id}" onclick="toggleDetail('${o.order_id}')">
            <td><span class="expand-icon">›</span></td>
            <td class="order-id" title="${o.order_id}">${o.order_id.slice(0, 8)}…</td>
            <td>${escHtml(o.item)}</td>
            <td>${o.quantity}</td>
            <td class="timestamp">${fmt(o.created_at)}</td>
            <td><span class="badge ${o.status}">${o.status.replace(/_/g, " ")}</span></td>
            <td><div class="pipeline">${pipeline(o.status)}</div></td>
          </tr>`,
          `<tr class="detail-row${isExpanded ? " visible" : ""}" id="detail-${o.order_id}">
            <td colspan="7">${detailRow(o)}</td>
          </tr>`,
        ];
      }).join("");

      const anyActive = orders.some(o => !TERMINAL.has(o.status));
      setAutoRefresh(anyActive);
    } catch (e) {
      document.getElementById("orders-body").innerHTML =
        '<tr><td colspan="7" class="empty">Error loading orders — is LocalStack running?</td></tr>';
      setAutoRefresh(false);
    }
  }

  document.getElementById("order-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("submit-btn");
    const flash = document.getElementById("flash");
    btn.disabled = true;
    flash.className = "flash";

    try {
      const res = await fetch(`${API}/orders`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          item: document.getElementById("item").value,
          quantity: parseInt(document.getElementById("quantity").value),
        }),
      });
      const data = await res.json();
      flash.className = "flash success";
      flash.textContent = `Order placed! ID: ${data.order_id}`;
      document.getElementById("item").value = "";
      document.getElementById("quantity").value = "1";
      loadOrders();
    } catch (err) {
      flash.className = "flash error";
      flash.textContent = `Error: ${err.message}`;
    } finally {
      btn.disabled = false;
    }
  });

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  loadOrders();
</script>
</body>
</html>
